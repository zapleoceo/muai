services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sessions:/app/sessions
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/tgbot:/var/www/tgbot
    networks:
      - tgbot

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: tgbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d tgbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tgbot

networks:
  tgbot:
    driver: bridge

volumes:
  pgdata:
  sessions:
