services:
  vera-core:
    build:
      context: .
      dockerfile: vera-core/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - vera_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/vera:/var/www/vera
    env_file: .env
    networks: [vera]

  vera-telegram:
    build:
      context: .
      dockerfile: vera-telegram/Dockerfile
    restart: unless-stopped
    volumes:
      - vera_data:/data
    env_file: .env
    networks: [vera]
    depends_on: [vera-core]

  vera-git:
    build:
      context: .
      dockerfile: vera-git/Dockerfile
    restart: unless-stopped
    volumes:
      - /var/www/vera:/workspace:ro
    env_file: .env
    networks: [vera]
    depends_on: [vera-core]

  vera-web:
    build:
      context: .
      dockerfile: vera-web/Dockerfile
    restart: unless-stopped
    volumes:
      - vera_data:/data
    env_file: .env
    networks: [vera]
    depends_on: [vera-core]

  vera-gmail:
    build:
      context: .
      dockerfile: vera-gmail/Dockerfile
    restart: unless-stopped
    volumes:
      - vera_data:/data
    env_file: .env
    networks: [vera]
    depends_on: [vera-core]

volumes:
  vera_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vera/data

networks:
  vera:
    driver: bridge
