services:
  vera-core:
    build: ./vera-core
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - vera_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/www/vera:/var/www/vera
    env_file: .env
    networks: [vera]

  vera-telegram:
    build: ./vera-telegram
    restart: unless-stopped
    volumes:
      - vera_data:/data
    env_file: .env
    networks: [vera]
    depends_on: [vera-core]

volumes:
  vera_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vera/data

networks:
  vera:
    driver: bridge
