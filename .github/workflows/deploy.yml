name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        env:
          PORT: ${{ secrets.HETZNER_PORT || '9617' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          PORT: ${{ secrets.HETZNER_PORT || '9617' }}
        run: |
          ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 \
              root@${{ secrets.HETZNER_HOST }} \
              'set -e
               cd /var/www/vera
               exec 200>/tmp/vera-deploy.lock
               flock -w 120 200
               git fetch --quiet origin master
               git reset --hard origin/master
               git log --oneline -1
               docker compose build --pull
               docker compose up -d --remove-orphans
               sleep 5
               docker compose ps'

      - name: Smoke ping dashboard
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w "%{http_code}" https://dima.veranda.my/ || true)
            if [ "$code" = "200" ]; then
              echo "dashboard up (HTTP $code)"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retry in 5s"
            sleep 5
          done
          echo "dashboard not responding after deploy" >&2
          exit 1
