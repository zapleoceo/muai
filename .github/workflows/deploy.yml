name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Capture previous SHA
        id: prev
        run: |
          PREV=$(ssh -p "$PORT" -o BatchMode=yes "root@$HOST" \
                 'cd /var/www/vera && git rev-parse HEAD' || echo "")
          echo "prev_sha=$PREV" >> "$GITHUB_OUTPUT"

      - name: Bootstrap (sync deploy script)
        run: |
          ssh -p "$PORT" -o BatchMode=yes "root@$HOST" '
            cd /var/www/vera
            git fetch --quiet origin master
            git checkout origin/master -- scripts/deploy.sh
            chmod +x scripts/deploy.sh
          '

      - name: Deploy
        id: deploy
        run: ssh -p "$PORT" -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 "root@$HOST"
             '/var/www/vera/scripts/deploy.sh'

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.prev_sha != ''
        run: |
          echo "Rolling back to ${{ steps.prev.outputs.prev_sha }}"
          ssh -p "$PORT" -o BatchMode=yes "root@$HOST" \
              "ROLLBACK_SHA=${{ steps.prev.outputs.prev_sha }} /var/www/vera/scripts/deploy.sh" \
              || echo "rollback failed"

      - name: Notify on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_VERA }}
          OWNER_ID: ${{ secrets.OWNER_TELEGRAM_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$BOT_TOKEN" ] && exit 0
          [ -z "$OWNER_ID" ] && exit 0
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d "chat_id=${OWNER_ID}" \
               -d "parse_mode=HTML" \
               -d "text=⚠️ Deploy failed → rolled back%0A${RUN_URL}" \
               -o /dev/null || true
