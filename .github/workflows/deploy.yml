name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -p 9617 root@195.201.31.49 \
            "set -e; cd /var/www/tgbot; \
             GIT_SSH_COMMAND='ssh -i /root/.ssh/github_deploy -o StrictHostKeyChecking=no' git pull origin master; \
             docker compose build bot; \
             docker compose run --rm bot python -c \"import asyncio; from app.services.plan_executor import ensure_search_infra, ensure_chunk_schema; asyncio.run(ensure_search_infra()); asyncio.run(ensure_chunk_schema()); print('schema OK')\"; \
             docker compose stop bot || true; docker compose rm -f bot || true; \
             docker compose up -d --force-recreate bot; \
             docker compose ps; \
             docker compose logs bot --tail=120 --no-log-prefix"
