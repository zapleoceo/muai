name: Deploy vera3 to Hetzner

on:
  push:
    branches: [master]
    paths:
      - 'vera3/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── 1. Docs gate ────────────────────────────────────────────────────────
  # Blocks deploy if vera3/services or vera3/shared changed without
  # vera3/docs being updated. Opt-out per commit: `docs-not-needed`.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify vera3/docs updated alongside code
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="$(git rev-parse "${HEAD}~1" 2>/dev/null || echo "$HEAD")"
          fi
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "changed files:"; echo "$CHANGED"

          if git log --format=%B "${BASE}..${HEAD}" 2>/dev/null | grep -qiF "docs-not-needed"; then
            echo "::notice::'docs-not-needed' marker found, skipping docs gate"
            exit 0
          fi

          CODE="$(echo "$CHANGED" | grep -E '^vera3/(services|shared)/' || true)"
          DOCS="$(echo "$CHANGED" | grep -E '^vera3/docs/' || true)"
          if [ -n "$CODE" ] && [ -z "$DOCS" ]; then
            echo "::error::Code changed in vera3/services or vera3/shared but vera3/docs was not updated."
            echo "Update the relevant doc OR add 'docs-not-needed' to a commit message."
            exit 1
          fi
          echo "docs gate passed"

  # ─── 2. Test gate ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vera3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -e ./shared[dev] aiosqlite
          pip install -e ./services/gateway[dev]
          pip install -e ./services/dashboard
          pip install -e ./services/media-worker
      - name: Pytest
        # Coverage gate stair-step. 2026-06-24: 40 → 60 → 70 (246 passed, 74.17%)
        run: |
          PYTHONPATH=shared:services/gateway/src:services/dashboard/src:services/media-worker/src \
          pytest tests/ \
            --cov=vera_shared --cov=gateway \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ─── 3. Quality gate ─────────────────────────────────────────────────────
  # Strict static analysis on the diff:
  #   (a) Ruff with extended ruleset (E,F,W,I,B,UP,SIM,C4,RET) — no warnings.
  #   (b) Vulture — flags dead/unused code in files touched by this push.
  #   (c) Diff-cover — ≥75% line coverage on the diff itself (not just repo total).
  #   (d) Docs-name sync — every newly-added public symbol (def foo / class Bar)
  #       must appear in vera3/docs/*; every removed symbol must NOT remain there.
  # Opt-out per commit: `docs-not-needed` (skips d only).
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -e ./vera3/shared[dev] aiosqlite
          pip install -e ./vera3/services/gateway[dev]
          pip install -e ./vera3/services/dashboard
          pip install -e ./vera3/services/media-worker
          pip install vulture==2.13 diff-cover==9.2.0 ruff==0.7.4

      - name: Compute diff base
        id: base
        shell: bash
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="$(git rev-parse "${HEAD}~1" 2>/dev/null || echo "$HEAD")"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE → $HEAD"

      - name: Ruff (strict, changed files only)
        # E501 line-too-long excluded — no formatter on the project yet.
        # Legacy code is grandfathered: only files touched by this push
        # get the strict treatment, so new code stays clean without a
        # 1000-file fix-everything migration.
        shell: bash
        run: |
          BASE="${{ steps.base.outputs.base }}"
          HEAD="${{ steps.base.outputs.head }}"
          CHANGED="$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
                      | grep -E '^vera3/(services|shared|tests)/.*\.py$' || true)"
          if [ -z "$CHANGED" ]; then
            echo "No changed .py files — skip ruff"
            exit 0
          fi
          echo "Linting:"; echo "$CHANGED"
          echo "$CHANGED" | xargs ruff check \
            --select E,F,W,I,B,UP,SIM,C4,RET --ignore E501,E402 --statistics

      - name: Vulture (dead-code on changed files)
        shell: bash
        run: |
          BASE="${{ steps.base.outputs.base }}"
          HEAD="${{ steps.base.outputs.head }}"
          CHANGED="$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
                      | grep -E '^vera3/(services|shared)/.*\.py$' || true)"
          if [ -z "$CHANGED" ]; then
            echo "No Python changes under vera3/services|shared — skip."
            exit 0
          fi
          echo "Scanning:"; echo "$CHANGED"
          # --min-confidence 80 is conservative; raises only when 4/5 sure.
          echo "$CHANGED" | xargs vulture --min-confidence 80 \
            --exclude '*/tests/*,*/__init__.py' || {
              echo "::warning::Vulture found suspected dead code — see above."
              exit 1
            }

      - name: Diff-cover (≥75% on new lines)
        # Only the lines this push changed need ≥75% coverage. Total-repo
        # gate (70%) handled separately by the test job. Skips automatically
        # when the diff has no .py files.
        shell: bash
        run: |
          BASE="${{ steps.base.outputs.base }}"
          HEAD="${{ steps.base.outputs.head }}"
          if ! git diff --name-only "$BASE" "$HEAD" | grep -qE '^vera3/.*\.py$'; then
            echo "No .py changes — skip diff-cover"
            exit 0
          fi
          cd vera3
          PYTHONPATH=shared:services/gateway/src:services/dashboard/src:services/media-worker/src \
            pytest tests/ -q --no-header \
              --cov=vera_shared --cov=gateway --cov=media_worker \
              --cov-report=xml:coverage.xml -p no:cacheprovider \
              || { echo "pytest exit $?"; exit 1; }
          # Compare against the parent commit on the same branch.
          diff-cover coverage.xml \
            --compare-branch="$BASE" \
            --fail-under=75

      - name: Docs name-sync
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.base.outputs.base }}"
          HEAD="${{ steps.base.outputs.head }}"
          if git log --format=%B "${BASE}..${HEAD}" 2>/dev/null | grep -qiF "docs-not-needed"; then
            echo "::notice::'docs-not-needed' marker — skip docs name-sync"
            exit 0
          fi
          # Public names = lowercase def + PascalCase class. Skip _private, test_, dunder.
          NAME_RE='^[+-](async )?def [a-z][a-z0-9_]*\(|^[+-]class [A-Z][A-Za-z0-9_]*[\(:]'
          DIFF="$(git diff "$BASE" "$HEAD" -- 'vera3/services/**/*.py' 'vera3/shared/**/*.py' || true)"
          ADDED="$(echo "$DIFF" | grep -E "^\+" | grep -E "$NAME_RE" \
                    | sed -E 's/^\+(async )?def ([a-z][a-z0-9_]*)\(.*/\2/;
                              s/^\+class ([A-Z][A-Za-z0-9_]*).*/\1/' \
                    | grep -vE '^test_|^_' | sort -u || true)"
          REMOVED="$(echo "$DIFF" | grep -E "^-" | grep -E "$NAME_RE" \
                      | sed -E 's/^-(async )?def ([a-z][a-z0-9_]*)\(.*/\2/;
                                s/^-class ([A-Z][A-Za-z0-9_]*).*/\1/' \
                      | grep -vE '^test_|^_' | sort -u || true)"
          NET_ADDED="$(comm -23 <(echo "$ADDED") <(echo "$REMOVED") | grep -v '^$' || true)"
          NET_REMOVED="$(comm -23 <(echo "$REMOVED") <(echo "$ADDED") | grep -v '^$' || true)"
          fail=0
          if [ -n "$NET_ADDED" ]; then
            echo "Added public names: $NET_ADDED"
            for name in $NET_ADDED; do
              if ! grep -rqF -- "$name" vera3/docs/ 2>/dev/null; then
                echo "::error::Added public symbol '$name' not mentioned anywhere in vera3/docs/"
                fail=1
              fi
            done
          fi
          if [ -n "$NET_REMOVED" ]; then
            echo "Removed public names: $NET_REMOVED"
            for name in $NET_REMOVED; do
              if grep -rqF -- "$name" vera3/docs/ 2>/dev/null; then
                echo "::error::Removed symbol '$name' still referenced in vera3/docs/ (orphan)"
                fail=1
              fi
            done
          fi
          [ "$fail" -eq 0 ] && echo "docs name-sync passed"
          exit $fail

  # ─── 4. Deploy ───────────────────────────────────────────────────────────
  # Hard-gated: docs + tests + quality must ALL pass.
  deploy:
    needs: [docs, test, quality]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Prefer the restricted key (vera3-only, command=...).
          # Falls back to the old full-root key if the new secret isn't set yet.
          # After you add HETZNER_SSH_KEY_VERA3 in repo settings, the old one
          # can be deleted.
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY_VERA3 || secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Trigger restricted deploy
        # The SSH key is wired to `command="/usr/local/bin/vera3-deploy"` on
        # the server — connecting at all runs git-pull + rsync vera3/ + compose
        # up. Any other command the client passes is ignored. Worst-case key
        # leak = attacker can re-run our own deploy, nothing else.
        run: |
          ssh -p "$PORT" -o ServerAliveInterval=30 \
              -o BatchMode=yes -o ConnectTimeout=15 \
              root@"$HOST"

      - name: HTTPS probe (best-effort)
        run: |
          curl -sf -o /dev/null -w "HTTPS dashboard: %{http_code}\n" \
            https://dima.veranda.my/login | grep -qE "200|303" \
            || echo "(CF probe failed but origin was healthy at deploy end)"

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_VERA }}
          OWNER_ID: ${{ secrets.OWNER_TELEGRAM_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$BOT_TOKEN" ] && exit 0
          [ -z "$OWNER_ID" ] && exit 0
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d "chat_id=${OWNER_ID}" \
               -d "parse_mode=HTML" \
               -d "text=⚠️ vera3 deploy failed%0A${RUN_URL}" \
               -o /dev/null || true
