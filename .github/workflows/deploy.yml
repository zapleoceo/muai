name: Deploy vera3 to Hetzner

on:
  push:
    branches: [master]
    paths:
      - 'vera3/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vera3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -e ./shared[dev] aiosqlite
          pip install -e ./services/gateway[dev]
      - name: Pytest
        # Coverage gate stair-step. 2026-06-24: 40 → 60 (239 passed, 68.45%)
        run: |
          PYTHONPATH=shared:services/gateway/src \
          pytest tests/ \
            --cov=vera_shared --cov=gateway \
            --cov-report=term-missing \
            --cov-fail-under=60

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOST: ${{ secrets.HETZNER_HOST }}
      PORT: ${{ secrets.HETZNER_PORT || '9617' }}

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          # Prefer the restricted key (vera3-only, command=...).
          # Falls back to the old full-root key if the new secret isn't set yet.
          # After you add HETZNER_SSH_KEY_VERA3 in repo settings, the old one
          # can be deleted.
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY_VERA3 || secrets.HETZNER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Trigger restricted deploy
        # The SSH key is wired to `command="/usr/local/bin/vera3-deploy"` on
        # the server — connecting at all runs git-pull + rsync vera3/ + compose
        # up. Any other command the client passes is ignored. Worst-case key
        # leak = attacker can re-run our own deploy, nothing else.
        run: |
          ssh -p "$PORT" -o ServerAliveInterval=30 \
              -o BatchMode=yes -o ConnectTimeout=15 \
              root@"$HOST"

      - name: HTTPS probe (best-effort)
        run: |
          curl -sf -o /dev/null -w "HTTPS dashboard: %{http_code}\n" \
            https://dima.veranda.my/login | grep -qE "200|303" \
            || echo "(CF probe failed but origin was healthy at deploy end)"

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_VERA }}
          OWNER_ID: ${{ secrets.OWNER_TELEGRAM_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$BOT_TOKEN" ] && exit 0
          [ -z "$OWNER_ID" ] && exit 0
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d "chat_id=${OWNER_ID}" \
               -d "parse_mode=HTML" \
               -d "text=⚠️ vera3 deploy failed%0A${RUN_URL}" \
               -o /dev/null || true
