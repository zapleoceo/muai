# Telegram → Claude MCP connector (remote MCP server, OAuth-protected).
# Public subdomain proxied to vera-telegram's in-process MCP server (:8011).
# TLS is terminated by the outer Cloudflare/nginx layer like the main site.
#
# IMPORTANT: also allowlist Anthropic's published egress IP ranges at the
# Cloudflare WAF — Claude reaches this endpoint from those addresses only.
server {
    listen 80;
    server_name tg-mcp.veranda.my;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streamable HTTP keeps long-lived POST/GET streams open.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
