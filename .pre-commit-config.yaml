# Install once: pip install pre-commit && pre-commit install
# Runs on every `git commit`; same checks CI enforces.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key   # blocks accidental .pem / id_rsa commits

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --select=E,F,W,I,B,UP]
        files: ^vera3/
      - id: ruff-format
        files: ^vera3/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (Vera fast unit)
        entry: bash -c 'cd vera3 && PYTHONPATH=shared:services/gateway/src pytest tests/unit -x --no-cov'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
