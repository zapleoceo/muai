name: vera3

services:
  # ─── Storage ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vera3-postgres
    environment:
      POSTGRES_USER: vera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vera}
      POSTGRES_DB: vera
    volumes:
      - vera3_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vera -d vera"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Observability ───────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: vera3-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-change-me-please}
      SALT: ${LANGFUSE_SALT:-change-me-too}
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  # ─── Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: vera3-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret}
      TOKEN_SECRET: ${TOKEN_SECRET}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  # ─── Auto-prune (housekeeping) ───────────────────────────────────────────
  prune:
    image: docker:cli
    container_name: vera3-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "while true; do
        docker system prune -af --filter 'until=72h' --filter 'label!=vera3.keep' || true;
        sleep 86400;
      done"
    restart: unless-stopped

volumes:
  vera3_pgdata:
    driver: local
