name: vera3

services:
  # ─── Storage ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vera3-postgres
    environment:
      POSTGRES_USER: vera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vera}
      POSTGRES_DB: vera
    volumes:
      - vera3_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vera -d vera"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: vera3-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev}
      TOKEN_SECRET: ${TOKEN_SECRET}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-0}
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped

  # ─── Brain: Triage Worker ───────────────────────────────────────────────
  brain-triage:
    build:
      context: ..
      dockerfile: services/brain-triage/Dockerfile
    container_name: vera3-brain-triage
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TRIAGE_POLL_INTERVAL_S: 15
      TRIAGE_BATCH_SIZE: 5
      TRIAGE_PACE_S: 2
      VERA_DAILY_GLOBAL_CAP_USD: ${VERA_DAILY_GLOBAL_CAP_USD:-2.0}
    restart: unless-stopped

  # ─── Brain: Search ──────────────────────────────────────────────────────
  brain-search:
    build:
      context: ..
      dockerfile: services/brain-search/Dockerfile
    container_name: vera3-brain-search
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      VERA_DAILY_GLOBAL_CAP_USD: ${VERA_DAILY_GLOBAL_CAP_USD:-2.0}
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

  # ─── Telegram Bot ───────────────────────────────────────────────────────
  bot-telegram:
    build:
      context: ..
      dockerfile: services/bot-telegram/Dockerfile
    container_name: vera3-bot-telegram
    depends_on:
      brain-search:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID}
      SEARCH_URL: http://brain-search:8000
    restart: unless-stopped

  # ─── Sync bridge from Vera 2.0 (временно, пока ingestor'ы не готовы) ─
  sync-bridge:
    build:
      context: ..
      dockerfile: services/sync-bridge/Dockerfile
    container_name: vera3-sync-bridge
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      VERA2_SQLITE: /vera2/vera.db
      SYNC_POLL_S: 60
    volumes:
      - /var/lib/docker/volumes/vera_vera_data/_data:/vera2:ro
    restart: unless-stopped

  # ─── Housekeeping ───────────────────────────────────────────────────────
  prune:
    image: docker:cli
    container_name: vera3-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "while true; do
        docker system prune -af --filter 'until=72h' || true;
        sleep 86400;
      done"
    restart: unless-stopped

volumes:
  vera3_pgdata:
    driver: local
