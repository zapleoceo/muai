name: vera3

services:
  # ─── Storage ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vera3-postgres
    environment:
      POSTGRES_USER: vera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vera}
      POSTGRES_DB: vera
    volumes:
      - vera3_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vera -d vera"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: vera3-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
      TOKEN_SECRET: ${TOKEN_SECRET}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:?OWNER_TELEGRAM_ID must be set}
      # broker-only: needed by /v1/claude/remember to embed for semantic dedup
      BROKER_URL: ${BROKER_URL:-}
      BROKER_PROJECT_KEY: ${BROKER_PROJECT_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped

  # ─── Brain: Triage Workers (scalable) ──────────────────────────────────
  # SELECT FOR UPDATE SKIP LOCKED исключает race condition между воркерами
  # Скейл: docker compose up -d --scale brain-triage=3
  brain-triage:
    build:
      context: ..
      dockerfile: services/brain-triage/Dockerfile
    # container_name НЕ задан — иначе scale ломается
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TRIAGE_POLL_INTERVAL_S: ${TRIAGE_POLL_INTERVAL_S:-5}
      TRIAGE_BATCH_SIZE: ${TRIAGE_BATCH_SIZE:-16}
      TRIAGE_CONCURRENCY: ${TRIAGE_CONCURRENCY:-5}
      TRIAGE_PACE_S: ${TRIAGE_PACE_S:-0.5}
      VERA_DAILY_GLOBAL_CAP_USD: ${VERA_DAILY_GLOBAL_CAP_USD:-2.0}
      BROKER_URL: ${BROKER_URL:-}
      BROKER_PROJECT_KEY: ${BROKER_PROJECT_KEY:-}
    restart: unless-stopped

  # ─── Brain: Search ──────────────────────────────────────────────────────
  brain-search:
    build:
      context: ..
      dockerfile: services/brain-search/Dockerfile
    container_name: vera3-brain-search
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      VERA_DAILY_GLOBAL_CAP_USD: ${VERA_DAILY_GLOBAL_CAP_USD:-2.0}
      BROKER_URL: ${BROKER_URL:-}
      BROKER_PROJECT_KEY: ${BROKER_PROJECT_KEY:-}
      # Для live-tool вызовов к ingestor-telegram (folder/dialog dump)
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
      TELEGRAM_TOOLS_URL: http://ingestor-telegram:8000
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

  # ─── Telegram Bot ───────────────────────────────────────────────────────
  bot-telegram:
    build:
      context: ..
      dockerfile: services/bot-telegram/Dockerfile
    container_name: vera3-bot-telegram
    depends_on:
      brain-search:
        condition: service_started
      gateway:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID}
      SEARCH_URL: http://brain-search:8000
      GATEWAY_URL: http://gateway:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
    restart: unless-stopped
    logging: {driver: json-file, options: {max-size: 10m, max-file: 3}}

  # NOTE: sync-bridge retired 2026-06-09 — Vera 2 is gone, its SQLite no
  # longer updates. ingestor-{telegram,gmail,instagram} cover everything.

  # ─── Gmail Ingestor ─────────────────────────────────────────────────────
  ingestor-gmail:
    build:
      context: ..
      dockerfile: services/ingestor-gmail/Dockerfile
    container_name: vera3-ingestor-gmail
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_POLL_S: 300
    restart: unless-stopped

  # ─── Telegram Userbot ───────────────────────────────────────────────────
  ingestor-telegram:
    build:
      context: ..
      dockerfile: services/ingestor-telegram/Dockerfile
    container_name: vera3-ingestor-telegram
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE}
      TELEGRAM_SESSION_DIR: /sessions
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
    volumes:
      - vera3_tg_sessions:/sessions
    expose:
      - "8000"
    restart: unless-stopped

  ingestor-instagram:
    build:
      context: ..
      dockerfile: services/ingestor-instagram/Dockerfile
    container_name: vera3-ingestor-instagram
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      GATEWAY_URL: http://gateway:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET must be set}
      IG_POLL_INTERVAL_S: "90"
    restart: unless-stopped

  # ─── Dashboard ──────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: services/dashboard/Dockerfile
    container_name: vera3-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vera:${POSTGRES_PASSWORD:-vera}@postgres:5432/vera
      TOKEN_SECRET: ${TOKEN_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-Dimondra_Ai_Bot}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID}
      SEARCH_URL: http://brain-search:8000
      BROKER_URL: ${BROKER_URL:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      DASHBOARD_BASE_URL: https://dima.veranda.my
    ports:
      - "127.0.0.1:8003:8000"
    restart: unless-stopped

  # ─── Housekeeping ───────────────────────────────────────────────────────
  prune:
    image: docker:cli
    container_name: vera3-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "while true; do
        docker system prune -af --filter 'until=72h' || true;
        sleep 86400;
      done"
    restart: unless-stopped

volumes:
  vera3_pgdata:
    driver: local
  vera3_tg_sessions:
    driver: local
